openapi: 3.1.0
info:
  title: UserService
  description: FastAPI demo for the OpenAPI docs-site project.
  version: 0.1.0
paths:
  /api/v1/users:
    post:
      tags:
      - UserService
      summary: Create a user
      operationId: CreateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserReq'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUserResp'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - UserService
      summary: List users
      operationId: ListUsers
      parameters:
      - name: q
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Q
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: size
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
          title: Size
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUsersResp'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/{user_id}:
    get:
      tags:
      - UserService
      summary: Get a user by ID
      operationId: GetUser
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
          title: User Id
      - name: X-Trace-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Trace-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserResp'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    BaseResp:
      properties:
        status_code:
          type: integer
          title: Status Code
          default: 0
        status_msg:
          type: string
          title: Status Msg
          default: ok
      type: object
      title: BaseResp
    CreateUserReq:
      properties:
        name:
          type: string
          maxLength: 31
          minLength: 1
          title: Name
        age:
          type: integer
          exclusiveMaximum: 200.0
          minimum: 0.0
          title: Age
        email:
          type: string
          title: Email
      type: object
      required:
      - name
      - age
      - email
      title: CreateUserReq
    CreateUserResp:
      properties:
        base:
          $ref: '#/components/schemas/BaseResp'
        user_id:
          type: integer
          title: User Id
      type: object
      required:
      - base
      - user_id
      title: CreateUserResp
    GetUserResp:
      properties:
        base:
          $ref: '#/components/schemas/BaseResp'
        user:
          $ref: '#/components/schemas/UserInfo'
      type: object
      required:
      - base
      - user
      title: GetUserResp
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ListUsersResp:
      properties:
        base:
          $ref: '#/components/schemas/BaseResp'
        users:
          items:
            $ref: '#/components/schemas/UserInfo'
          type: array
          title: Users
        total:
          type: integer
          title: Total
      type: object
      required:
      - base
      - users
      - total
      title: ListUsersResp
    UserInfo:
      properties:
        user_id:
          type: integer
          title: User Id
        name:
          type: string
          title: Name
        age:
          type: integer
          exclusiveMaximum: 200.0
          minimum: 0.0
          title: Age
        email:
          type: string
          title: Email
      type: object
      required:
      - user_id
      - name
      - age
      - email
      title: UserInfo
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
